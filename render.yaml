services:
  - type: web
    name: credit-card-sms-tracker
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
